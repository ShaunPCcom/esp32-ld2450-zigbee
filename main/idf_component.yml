## IDF Component Manager Manifest File
dependencies:
  ## Required IDF version
  idf:
    version: '>=5.5.0'
  # # Put list of dependencies here
  # # For components maintained by Espressif:
  # component: "~1.0.0"
  # # For 3rd party components:
  # username/component: ">=1.0.0,<2.0.0"
  # username2/component2:
  #   version: "~1.0.0"
  #   # For transient dependencies `public` flag can be set.
  #   # `public` flag doesn't have an effect dependencies of the `main` component.
  #   # All dependencies of `main` are public by default.
  #   public: true
  espressif/mdns: ">=1.0.0"
  espressif/esp-zigbee-lib: ^1.6.4
  espressif/esp-zboss-lib: '*'
  led_strip: "*"
  zigbee_ota:
    git: https://github.com/ShaunPCcom/esp32-zigbee-ota.git
    version: "main"

  board_led:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: board_led
    version: "master"
  zigbee_core:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: zigbee_core
    version: "master"
  crash_diag:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: crash_diag
    version: "master"
  wifi_manager:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: wifi_manager
    version: "master"
  ota_check:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: ota_check
    version: "master"
  web_server_base:
    git: https://github.com/ShaunPCcom/esp32-common.git
    path: web_server_base
    version: "master"
