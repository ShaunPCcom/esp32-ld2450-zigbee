# LD2450 Zigbee Sensor - Plotly Graph Card
# Visualizes target positions and zone boundaries in real-time
#
# Based on: Anthony Hua's LD2450-map-chart.yaml
# https://github.com/athua/ha-utils/blob/main/LD2450-map-chart.yaml
# Modified for Zigbee entity naming, 10-zone support, and CSV coordinate format
#
# Prerequisites:
# - Plotly Graph Card installed via HACS
# - Replace YOUR_DEVICE_ID with your Zigbee device IEEE address
#
type: custom:plotly-graph
title: mmWave Radar Sensor
refresh_interval: 1
hours_to_show: current_day
layout:
  height: 520
  margin:
    l: 50
    r: 20
    t: 20
    b: 40
  showlegend: true
  xaxis:
    dtick: 1
    gridcolor: RGBA(200,200,200,0.15)
    zerolinecolor: RGBA(200,200,200,0.15)
    type: number
    fixedrange: true
    range:
      - -6
      - 6
  yaxis:
    dtick: 1
    gridcolor: RGBA(200,200,200,0.15)
    zerolinecolor: RGBA(200,200,200,0.15)
    scaleanchor: x
    scaleratio: 1
    fixedrange: true
    range:
      - 6
      - 0
entities:
  - entity: ""
    name: Target1
    marker:
      size: 12
    line:
      shape: spline
      width: 5
    x:
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_1_x"].state /1
    "y":
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_1_y"].state /1
  - entity: ""
    name: Target2
    marker:
      size: 12
    line:
      shape: spline
      width: 5
    x:
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_2_x"].state /1
    "y":
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_2_y"].state /1
  - entity: ""
    name: Target3
    marker:
      size: 12
    line:
      shape: spline
      width: 5
    x:
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_3_x"].state /1
    "y":
      - $ex hass.states["sensor.YOUR_DEVICE_ID_target_3_y"].state /1
  - entity: ""
    name: Zone1
    mode: lines
    fill: toself
    fillcolor: RGBA(20,200,0,0.1)
    line:
      color: RGBA(20,200,0,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_1_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_1_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone2
    mode: lines
    fill: toself
    fillcolor: RGBA(200,0,255,0.1)
    line:
      color: RGBA(200,0,255,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_2_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_2_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone3
    mode: lines
    fill: toself
    fillcolor: RGBA(200,120,55,0.1)
    line:
      color: RGBA(200,120,55,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_3_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_3_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone4
    mode: lines
    fill: toself
    fillcolor: RGBA(200,250,55,0.3)
    line:
      color: RGBA(200,220,55,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_4_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_4_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
