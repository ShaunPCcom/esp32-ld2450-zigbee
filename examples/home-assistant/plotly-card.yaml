    line:
      color: RGBA(120,55,55,0.4)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_5_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_5_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone6
    mode: lines
    fill: toself
    fillcolor: RGBA(0,180,220,0.1)
    line:
      color: RGBA(0,180,220,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_6_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_6_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone7
    mode: lines
    fill: toself
    fillcolor: RGBA(220,100,0,0.1)
    line:
      color: RGBA(220,100,0,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_7_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_7_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone8
    mode: lines
    fill: toself
    fillcolor: RGBA(180,0,80,0.1)
    line:
      color: RGBA(180,0,80,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_8_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_8_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone9
    mode: lines
    fill: toself
    fillcolor: RGBA(0,140,100,0.1)
    line:
      color: RGBA(0,140,100,0.2)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_9_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_9_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Zone10
    mode: lines
    fill: toself
    fillcolor: RGBA(120,120,0,0.2)
    line:
      color: RGBA(120,120,0,0.3)
      shape: line
      width: 2
    x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_10_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
    "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_10_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
  - entity: ""
    name: Coverage
    mode: lines
    fill: tonexty
    fillcolor: rgba(168, 216, 234, 0.15)
    line:
      shape: line
      width: 1
      dash: dot
    x:
      - 0
      - $ex 600 * Math.sin((2 * Math.PI)/360 * 60)
      - 450
      - 400
      - 300
      - 200
      - 100
      - 0
      - -100
      - -200
      - -300
      - -400
      - -450
      - $ex -600 * Math.sin((2 * Math.PI)/360 * 60)
      - 0
    "y":
      - 0
      - $ex 600 * Math.cos((2 * Math.PI)/360 * 60)
      - $ex Math.sqrt( 600**2 - 450**2 )
      - $ex Math.sqrt( 600**2 - 400**2 )
      - $ex Math.sqrt( 600**2 - 300**2 )
      - $ex Math.sqrt( 600**2 - 200**2 )
      - $ex Math.sqrt( 600**2 - 100**2 )
      - 600
      - $ex Math.sqrt( 600**2 - 100**2 )
      - $ex Math.sqrt( 600**2 - 200**2 )
      - $ex Math.sqrt( 600**2 - 300**2 )
      - $ex Math.sqrt( 600**2 - 400**2 )
      - $ex Math.sqrt( 600**2 - 450**2 )
      - $ex 600 * Math.cos((2 * Math.PI)/360 * 60)
      - 0
raw_plotly_config: true
grid_options:
  columns: full
