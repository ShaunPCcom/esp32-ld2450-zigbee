badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: binary_sensor.YOUR_DEVICE_ID_zone_1_occupancy
    state_content: state
    tap_action:
      action: none
    name: Whole Room
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: binary_sensor.YOUR_DEVICE_ID_zone_2_occupancy
    state_content: state
    tap_action:
      action: none
    name: Shelf Unit
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: binary_sensor.YOUR_DEVICE_ID_zone_3_occupancy
    state_content: state
    tap_action:
      action: none
    name: Zone 3
