            x: "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_7_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const x=v.filter((_,i)=>i%2===0); return x.length>2?[...x,x[0]]:x; }"
            "y": "$fn ({hass}) => { const s=(hass.states['text.YOUR_DEVICE_ID_zone_7_coords']||{}).state||''; if(!s||s==='unknown'||s==='')return[null]; const v=s.split(',').map(Number); const y=v.filter((_,i)=>i%2===1); return y.length>2?[...y,y[0]]:y; }"
          - entity: ""
